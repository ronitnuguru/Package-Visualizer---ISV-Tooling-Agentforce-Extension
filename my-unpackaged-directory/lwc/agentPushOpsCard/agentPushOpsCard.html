<template>
    <lightning-card>
        <h2 slot="title" class="slds-truncate">
            <lightning-icon icon-name="standard:upgrade_action" class="slds-m-right_x-small"></lightning-icon>
            Push Upgrade Operations
        </h2>
        <div class="slds-card__body slds-card__body_inner slds-p-bottom_small">
            <template lwc:if={hasError}>
                <div class="slds-text-color_error slds-p-horizontal_small">{data.errorMessage}</div>
            </template>

            <template lwc:if={isPlan}>
                <dl class="slds-list_horizontal slds-wrap slds-p-horizontal_small">
                    <dt class="slds-item_label slds-text-color_weak slds-truncate slds-size_1-of-2">Target Version</dt>
                    <dd class="slds-item_detail slds-truncate slds-size_1-of-2">{data.targetVersionNumber}</dd>

                    <dt class="slds-item_label slds-text-color_weak slds-truncate slds-size_1-of-2">Eligible Orgs</dt>
                    <dd class="slds-item_detail slds-truncate slds-size_1-of-2">{data.eligibleCount}</dd>

                    <dt class="slds-item_label slds-text-color_weak slds-truncate slds-size_1-of-2">Already Current</dt>
                    <dd class="slds-item_detail slds-truncate slds-size_1-of-2">{data.alreadyCurrentCount}</dd>

                    <dt class="slds-item_label slds-text-color_weak slds-truncate slds-size_1-of-2">Batches</dt>
                    <dd class="slds-item_detail slds-truncate slds-size_1-of-2">{data.estimatedChunks}</dd>
                </dl>
                <p class="slds-p-horizontal_small slds-p-top_x-small slds-text-body_regular">{data.summaryLine}</p>
            </template>

            <template lwc:if={isMonitor}>
                <dl class="slds-list_horizontal slds-wrap slds-p-horizontal_small">
                    <dt class="slds-item_label slds-text-color_weak slds-truncate slds-size_1-of-2">Status</dt>
                    <dd class="slds-item_detail slds-truncate slds-size_1-of-2">{data.status}</dd>

                    <dt class="slds-item_label slds-text-color_weak slds-truncate slds-size_1-of-2">Succeeded</dt>
                    <dd class="slds-item_detail slds-truncate slds-size_1-of-2">{data.succeededJobs}</dd>

                    <dt class="slds-item_label slds-text-color_weak slds-truncate slds-size_1-of-2">Failed</dt>
                    <dd class="slds-item_detail slds-truncate slds-size_1-of-2">{data.failedJobs}</dd>

                    <dt class="slds-item_label slds-text-color_weak slds-truncate slds-size_1-of-2">Pending</dt>
                    <dd class="slds-item_detail slds-truncate slds-size_1-of-2">{data.pendingJobs}</dd>
                </dl>
                <p class="slds-p-horizontal_small slds-p-top_x-small slds-text-body_regular">{data.rootCauseSummary}</p>
                <template lwc:if={hasFailures}>
                    <div class="slds-p-horizontal_small slds-p-top_x-small">
                        <p class="slds-text-title_caps slds-text-color_weak">Top Failures</p>
                        <ul class="slds-list_dotted">
                            <template for:each={failureRows} for:item="failure">
                                <li key={failure.errorTitle} class="slds-item">{failure.display}</li>
                            </template>
                        </ul>
                    </div>
                </template>
            </template>
        </div>
    </lightning-card>
</template>
